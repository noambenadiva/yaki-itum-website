<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>צור קשר - יקי איטום</title>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">יקי איטום</div>
            <ul class="nav-links">
                <li><a href="index.html">בית</a></li>
                <li><a href="services.html">שירותים</a></li>
                <li><a href="contact.html">צור קשר</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>צור קשר</h1>
            <p>התקשר לצוות שלנו היום</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-info">
                <h2>פרטי התקשרות</h2>
                <div class="info-item">
                    <h3>📞 טלפון</h3>
                    <p>
                        <a href="tel:+972503131231" class="btn btn-primary" style="display: inline-block; margin-top: 1rem; padding: 1rem 2rem; font-size: 1.1rem;">💬 התקשר עכשיו - 0503131231</a>
                    </p>
                </div>
            </div>

            <div class="contact-form-container">
                <h2>שלח לנו הודעה</h2>
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="name">שם *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">דוא"ל *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">טלפון</label>
                        <input type="tel" id="phone" name="phone">
                    </div>

                    <div class="form-group">
                        <label for="service">שירות שמעניין אותך *</label>
                        <select id="service" name="service" required>
                            <option value="">בחר שירות</option>
                            <option value="basement">איטום מרתפים</option>
                            <option value="foundation">איטום ביסוד</option>
                            <option value="roof">איטום גגות</option>
                            <option value="bathroom">איטום חדרי אמבטיה ומטבחים</option>
                            <option value="commercial">איטום מסחרי</option>
                            <option value="repair">תיקון נזקי מים</option>
                            <option value="other">אחר</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">הודעה *</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">שלח הודעה</button>
                </form>
                <div id="formMessage" class="form-message"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 יקי איטום. כל הזכויות שמורות.</p>
            <p>שירותי איטום מקצועיים</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
