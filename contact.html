<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>צור קשר - יקי איטום</title>
  <style>
    html,body{height:100%;}
    body {margin:0;min-height:100vh;font-family:"Segoe UI",Arial,sans-serif;display:flex;background:#11294d;overflow-x:hidden;}
    .waves-bg{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;}
    .side-menu{width:220px;background:rgba(13,48,104,0.85);backdrop-filter:blur(7px);box-shadow:0 8px 32px rgba(20,60,131,0.12);min-height:100vh;display:flex;flex-direction:column;align-items:flex-start;padding:36px 0 0 0;z-index:2;position:relative;}
    .logo-side{display:flex;align-items:center;gap:9px;color:#fff;font-size:1.25em;font-weight:bold;margin:0 0 40px 0;padding-right:18px;}
    .logo-icon-side{width:40px;height:40px;background:linear-gradient(135deg,#63c6ff 0%,#0066cc 80%);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.22em;border:2px solid #31bbff45;}
    .side-nav-links{list-style:none;width:100%;padding:0 0 0 6px;margin-bottom:35px;}
    .side-nav-links li{margin-bottom:20px;}
    .side-nav-links a{color:#e8f6ff;text-decoration:none;font-weight:600;font-size:1.1em;padding:7px 20px 7px 8px;border-radius:9px 0 0 9px;display:flex;align-items:center;transition:background 0.28s,color 0.24s;}
    .side-nav-links .active,.side-nav-links a:hover{color:#73e2ff;background:linear-gradient(90deg,rgba(74,157,239,0.12) 60%,rgba(74,157,239,0.06) 95%);transform:translateX(-3px);}
    .main-section{flex:1;min-height:100vh;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 16px;}
    h1{color:#fff;margin:70px 0 24px;font-size:2.3em;font-weight:bold;text-shadow:0 2px 26px #46b8f668,0 0 7px #1892fd38;letter-spacing:.8px;}
    .contact-block{background:rgba(255,255,255,0.09);border-radius:18px;max-width:360px;margin:0 auto;text-align:center;padding:24px 20px;box-shadow:0 2px 22px #0862cd22;}
    form{display:flex;flex-direction:column;gap:16px;}
    .input-field{background:rgba(255,255,255,0.34);color:#053565;padding:14px 12px;font-size:1.1em;border-radius:8px;border:none;outline:none;box-shadow:0 1px 9px #059ae245;font-family:inherit;}
    .input-field:focus{background:rgba(255,255,255,0.45);}
    textarea.input-field{min-height:60px;resize:vertical;}
    .btn-form{background:linear-gradient(90deg,#309dfd 30%,#1bb8e6 100%);color:#fff;border:none;font-size:1.15em;font-weight:bold;border-radius:26px;padding:13px 0;box-shadow:0 2px 14px #0a143d30;text-decoration:none;transition:.27s all;cursor:pointer;width:100%;}
    .btn-form:hover{background:linear-gradient(90deg,#1bb8e6 10%,#227cf0 88%);}
    .call-btn{background:#0086ff;color:#fff;border:none;font-size:1.13em;font-weight:bold;border-radius:26px;padding:10px 0;margin:18px 0 0 0;box-shadow:0 2px 14px #05356530;text-decoration:none;transition:.27s all;cursor:pointer;width:100%;}
    .call-btn:hover{background:#53befb;color:#042173;}
    @media(max-width:1100px){.side-menu{width:160px;}.logo-side{font-size:1em;}.contact-block{max-width:99vw;}}
    @media(max-width:800px){body{flex-direction:column;}.side-menu{position:relative;flex-direction:row;width:100vw;min-height:unset;height:66px;padding:0 12px;align-items:center;justify-content:flex-start;box-shadow:0 4px 20px #003a8033;}.logo-side{margin:0 13px 0 0;}.side-nav-links{display:flex;flex-direction:row;gap:12px;margin-bottom:0;}.side-nav-links li{margin-bottom:0;}.main-section{padding:0;}h1{font-size:1.3em;}.contact-block{padding:14px 0;}}
  </style>
</head>
<body>
  <div class="waves-bg">
    <svg viewBox="0 0 1800 880" width="100%" height="100%" preserveAspectRatio="none">
      <defs>
        <linearGradient id="dynamicBlueGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#309dfd">
            <animate attributeName="stop-color" values="#309dfd;#1bb8e6;#227cf0;#309dfd" dur="8s" repeatCount="indefinite"/>
          </stop>
          <stop offset="100%" stop-color="#1767a7">
            <animate attributeName="stop-color" values="#1767a7;#52affe;#227cf0;#1767a7" dur="7s" repeatCount="indefinite"/>
          </stop>
        </linearGradient>
      </defs>
      <path d="M0,180 Q500,280 900,170 T1800,140 V880 H0 Z"
        fill="url(#dynamicBlueGrad)">
        <animate attributeName="d"
          values="M0,180 Q500,280 900,170 T1800,140 V880 H0 Z;M0,160 Q520,200 900,260 T1800,220 V880 H0 Z;M0,220 Q450,320 900,170 T1800,200 V880 H0 Z;M0,180 Q500,280 900,170 T1800,140 V880 H0 Z"
          dur="9s" repeatCount="indefinite" />
      </path>
    </svg>
  </div>
  <aside class="side-menu">
    <div class="logo-side">
      <div class="logo-icon-side">💧</div>
      יקי איטום
    </div>
    <ul class="side-nav-links">
      <li><a href="index.html">בית</a></li>
      <li><a href="about.html">אודות</a></li>
      <li><a href="services.html">שירותים</a></li>
      <li><a href="gallery.html">גלריה</a></li>
      <li><a href="contact.html" class="active">צור קשר</a></li>
    </ul>
  </aside>
  <main class="main-section">
      <h1>צור קשר</h1>
      <div class="contact-block">
        <form onsubmit="sendEmail(event)">
          <input type="text" class="input-field" name="name" placeholder="שם מלא" required />
          <input type="email" class="input-field" name="email" placeholder="אימייל" required />
          <input type="tel" class="input-field" name="phone" placeholder="מספר טלפון" required />
          <textarea class="input-field" name="message" placeholder="הודעה" required></textarea>
          <button type="submit" class="btn-form">שלח</button>
        </form>
        <div style="height:18px;"></div>
        <a href="tel:0503131231" class="call-btn">התקשר ליקי 050-313-1231</a>
        <div class="owner-image-contact">
    <img src="media/271a74fa-0d39-4060-9259-95fe3561b1ab.jpg" alt="בעל העסק"/>
</div>
      </div>
      <script>
      function sendEmail(event) {
        event.preventDefault();
        var form = event.target;
        var name = form.name.value;
        var email = form.email.value;
        var phone = form.phone.value;
        var message = form.message.value;
        var mailto = "mailto:yaki@itum.co.il"
          + "?subject=" + encodeURIComponent("פניה מהאתר יקי איטום")
          + "&body=" + encodeURIComponent("שם: " + name + "\nאימייל: " + email + "\nטלפון: " + phone + "\n\nהודעה: " + message);
        window.location.href = mailto;
      }
      </script>
  </main>
</body>
</html>
