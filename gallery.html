<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>עבודות שלנו - יקי איטום</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: linear-gradient(135deg, #f4fbff 0%, #e9f6ff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #0b2a3a;
        }

        h1 {
            text-align: center;
            color: #0b5aa5;
            margin: 30px 0 40px;
            font-size: 2.4em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.08);
        }

        .phone-section {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-mock {
            position: relative;
            width: 320px;
            height: 640px;
            background: #0b0b0b;
            border-radius: 44px;
            padding: 14px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.12);
            justify-self: center;
        }

        .phone-mock::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 26px;
            background: #0b0b0b;
            border-radius: 0 0 18px 18px;
            z-index: 2;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 34px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }

        @media (max-width: 980px) {
            .phone-mock {
                width: 290px;
                height: 580px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">💧</div>
                <span>יקי איטום</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">בית</a></li>
                <li><a href="services.html">שירותים</a></li>
                <li><a href="gallery.html">גלריה</a></li>
                <li><a href="contact.html">צור קשר</a></li>
            </ul>
        </div>
    </nav>

    <h1>עבודות שלנו</h1>

    <section class="phone-section">
        <div class="phone-mock">
            <div class="phone-screen">
                <video controls playsinline>
                    <source src="media/WhatsApp Video 2026-03-12 at 13.47.56.mp4" type="video/mp4" />
                    הדפדפן שלך לא תומך בווידאו.
                </video>
            </div>
        </div>
    </section>
</body>
</html>
