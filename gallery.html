<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>גלריה - יקי איטום</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e90ff 0%, #87ceeb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Phone Screen Section */
        .phone-section {
            max-width: 900px;
            margin: 0 auto 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .phone-mock {
            position: relative;
            width: 300px;
            height: 600px;
            background: #000;
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .phone-mock::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-preview {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .video-preview img {
            width: 100%;
            max-width: 350px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .video-preview h2 {
            color: white;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .video-preview p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .phone-section {
                flex-direction: column;
                gap: 20px;
            }

            .phone-mock {
                width: 250px;
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">💧</div>
                <span>יקי איטום</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">בית</a></li>
                <li><a href="services.html">שירותים</a></li>
                <li><a href="gallery.html">גלריה</a></li>
                <li><a href="contact.html">צור קשר</a></li>
            </ul>
        </div>
    </nav>

    <h1>עבודות שלנו</h1>

    <!-- Phone Screen with Video -->
    <section class="phone-section">
        <div class="video-preview">
            <img src="media/271a74fa-0d39-4060-9259-95fe3561b1ab.jpg" alt="עבודה">
            <h2>צפו בעבודות שלנו</h2>
            <p>סרטון של כל העבודות המקצועיות שלנו</p>
        </div>

        <div class="phone-mock">
            <div class="phone-screen">
                <video controls>
                    <source src="media/WhatsApp Video 2026-03-12 at 13.16.44.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>
</body>
</html>
