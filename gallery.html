<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>עבודות שלנו - יקי איטום</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: linear-gradient(135deg, #227cf0 0%, #1bb8e6 100%);
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #fff;
            display: flex;
        }

        /* תפריט צד שמאל */
        .side-menu {
            width: 210px;
            background: rgba(255,255,255,0.11);
            padding: 40px 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            box-shadow: 0 0 24px rgba(90,120,255,0.08);
            min-height: 100vh;
        }
        .side-menu .logo-side {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.22em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 40px;
        }
        .side-menu .logo-icon-side {
            background: linear-gradient(135deg,#63c6ff 0%, #0066cc 80%);
            border-radius: 50%;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 1.21em;
            margin-left:3px;
        }
        .side-nav-links {
            list-style: none;
            width: 100%;
            padding: 0;
            margin-bottom: 30px;
        }
        .side-nav-links li {
            margin-bottom: 18px;
        }
        .side-nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
            transition: color 0.2s, background 0.2s;
            padding: 6px 12px 6px 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
        }
        .side-nav-links a:hover,
        .side-nav-links .active {
            background: rgba(255,255,255,0.14);
            color: #3869ff;
        }

        .gallery-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px 30px;
        }

        h1 {
            color: #fff;
            margin: 38px 0 36px;
            font-size: 2.3em;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 14px rgba(0,50,120,0.21);
        }

        .phone-section {
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .phone-mock {
            position: relative;
            width: 320px;
            height: 640px;
            background: #121a26;
            border-radius: 44px;
            padding: 12px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.29);
            border: 1px solid rgba(255,255,255,0.07);
            justify-self: center;
            animation: floatPhone 3s ease-in-out infinite alternate;
            margin-top: 35px;
        }
        @keyframes floatPhone {
            0% { transform: translateY(0px);}
            100% { transform: translateY(-18px);}
        }

        .phone-mock::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 26px;
            background: #121a26;
            border-radius: 0 0 18px 18px;
            z-index: 2;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 34px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0, 85, 255, 0.13);
        }
        .phone-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }
        @media (max-width: 1100px) {
            .side-menu{width:155px;}
            .gallery-container{padding:8px 8px;}
        }
        @media (max-width:768px) {
            body{flex-direction:column;}
            .side-menu{width:100vw;min-height:80px;flex-direction:row;padding:8px 4px;}
            .gallery-container{padding:8px;}
            .side-nav-links{display:flex;gap:13px;margin-bottom:0;}
            .side-nav-links li{margin-bottom:0;}
            h1{font-size:1.3em;}
            .phone-mock{width:200px;height:340px;margin-top:18px;}
        }
    </style>
</head>
<body>
    <!-- תפריט צד שמאל -->
    <aside class="side-menu">
        <div class="logo-side">
            <div class="logo-icon-side">💧</div>
            יקי איטום
        </div>
        <ul class="side-nav-links">
    <li><a href="index.html">בית</a></li>
    <li><a href="about.html">אודות</a></li>
    <li><a href="services.html">שירותים</a></li>
    <li><a href="gallery.html">גלריה</a></li>
    <li><a href="reviews.html">ביקורות</a></li>
    <li><a href="contact.html">צור קשר</a></li>
</ul>
    </aside>

    <div class="gallery-container">
        <h1>עבודות שלנו</h1>
        <section class="phone-section">
            <div class="phone-mock">
                <div class="phone-screen">
                    <video controls playsinline>
                        <source src="media/WhatsApp Video 2026-03-12 at 13.47.56.mp4" type="video/mp4" />
                        הדפדפן שלך לא תומך בווידאו.
                    </video>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
