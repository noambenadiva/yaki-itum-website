<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>עבודות שלנו - יקי איטום</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* רקע דינמי עם גלים כחולים (SVG + gradient animation) */
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }
        .main-content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin: 40px 0 36px;
            font-size: 2.5em;
            text-shadow: 0 2px 22px rgba(0, 64, 180, 0.22);
            letter-spacing: 1px;
            font-weight: bold;
        }

        .phone-section {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .phone-mock {
            position: relative;
            width: 320px;
            height: 640px;
            background: #0b0b0b;
            border-radius: 44px;
            padding: 14px;
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.12);
            justify-self: center;
            animation: floatPhone 3s ease-in-out infinite alternate;
        }
        @keyframes floatPhone {
            0% { transform: translateY(0px);}
            100% { transform: translateY(-18px);}
        }

        .phone-mock::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 26px;
            background: #0b0b0b;
            border-radius: 0 0 18px 18px;
            z-index: 2;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 34px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0, 85, 255, 0.2);
        }
        .phone-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .navbar {
            background: transparent;
            padding: 15px 0;
            position: relative;
            z-index: 4;
        }
        .navbar .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            z-index: 4;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #63c6ff 0%, #0066cc 80%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            border: 2px solid #fff;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            text-shadow: 0 2px 8px rgba(0,50,120,0.27);
        }
        .nav-links a:hover {
            color: #93e2ff;
        }

        @media (max-width: 980px) {
            .phone-mock {
                width: 240px;
                height: 430px;
            }
            h1 {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
    <!-- רקע SVG גלים כחול דינמי -->
    <div class="dynamic-bg">
        <svg width="100vw" height="100vh" viewBox="0 0 1440 880" preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;">
            <defs>
                <linearGradient id="blueGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#0066cc">
                        <animate attributeName="stop-color" values="#0066cc;#309dfd;#0066cc" dur="6s" repeatCount="indefinite"/>
                    </stop>
                    <stop offset="100%" stop-color="#89d7ff">
                        <animate attributeName="stop-color" values="#89d7ff;#b3e5fc;#89d7ff" dur="6s" repeatCount="indefinite"/>
                    </stop>
                </linearGradient>
            </defs>
            <path d="M0,170 Q360,330 720,170 T1440,170 V880 H0 Z"
                fill="url(#blueGradient)">
                <animate attributeName="d"
                    values="
                    M0,170 Q360,330 720,170 T1440,170 V880 H0 Z;
                    M0,190 Q400,290 720,270 T1440,210 V880 H0 Z;
                    M0,170 Q360,330 720,170 T1440,170 V880 H0 Z"
                    dur="6s" repeatCount="indefinite"/>
            </path>
        </svg>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">💧</div>
                <span>יקי איטום</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">בית</a></li>
                <li><a href="services.html">שירותים</a></li>
                <li><a href="gallery.html">גלריה</a></li>
                <li><a href="contact.html">צור קשר</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <h1>עבודות שלנו</h1>

        <section class="phone-section">
            <div class="phone-mock">
                <div class="phone-screen">
                    <video controls playsinline>
                        <source src="media/WhatsApp Video 2026-03-12 at 13.47.56.mp4" type="video/mp4" />
                        הדפדפן שלך לא תומך בווידאו.
                    </video>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
